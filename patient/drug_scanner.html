<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الماسح الذكي للأدوية | AI</title>
    
    <link rel="stylesheet" href="../css/patient_dash.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

    <style>
        body { margin: 0; padding: 0; background: var(--bg-color, #0a0a0a); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
        
        .slide-header {
            background: var(--card-bg); padding: 15px 20px; padding-top: calc(env(safe-area-inset-top, 15px) + 15px);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; position: sticky; top: 0;
        }
        .back-btn { font-size: 28px; cursor: pointer; color: var(--text-main); }

        /* أنيميشن الماسح الفضائي المطور 🛸 */
        .scanner-container {
            position: relative; width: 250px; height: 250px; margin: 30px auto;
            border: 2px dashed var(--blue, #00d2ff); border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); overflow: hidden; background: #111;
        }
        
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top:0; left:0; z-index: 1; }
        
        .scanner-laser {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--blue, #00d2ff); box-shadow: 0 0 20px var(--blue), 0 0 40px var(--blue);
            animation: scan 2s linear infinite; z-index: 3; display: none;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-icon { font-size: 80px; color: rgba(0, 210, 255, 0.8); z-index: 2; transition: 0.3s; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* تصميم الأزرار السحرية */
        .magic-btn {
            display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%;
            padding: 18px; border-radius: 15px; font-family: 'Cairo'; font-size: 16px; font-weight: bold;
            margin-bottom: 15px; cursor: pointer; border: none; transition: transform 0.2s, box-shadow 0.3s;
        }
        .magic-btn:active { transform: scale(0.96); }
        
        .btn-ai-scan { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); border: 1px solid rgba(255,255,255,0.2); }
        .btn-ai-scan ion-icon { font-size: 28px; animation: pulseGlow 2s infinite alternate; }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 5px white; } 100% { text-shadow: 0 0 20px white; } }

        /* واجهة التحليل */
        #ai-status { color: var(--blue); font-size: 14px; font-weight: bold; margin-top: 15px; height: 20px; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="top-progress-bar" style="position: fixed; top: 0; left: 0; height: 3px; background: var(--blue, #00d2ff); width: 0%; z-index: 999999; transition: width 0.3s ease; display: none; box-shadow: 0 0 10px var(--blue);"></div>

    <div class="slide-header">
        <ion-icon name="arrow-forward-outline" class="back-btn" onclick="window.goToPage('patient_dash.html')"></ion-icon>
        <h2 style="margin: 0; font-size: 18px; color: var(--blue);">الماسح الذكي للرعاية 🧠</h2>
    </div>

    <div style="padding: 20px; flex: 1; overflow-y: auto; text-align: center;">
        
        <p style="color: var(--text-sub); font-size: 14px; line-height: 1.6;">
            هذا الماسح مدعوم بنموذج <strong style="color: var(--blue);">Google Gemini AI</strong>. قم بتصوير علبة الدواء وسيقوم الذكاء الاصطناعي بتحليلها طبياً لك كأنه صيدلي بشري.
        </p>

        <div class="scanner-container" id="scanner-box">
            <img id="preview-img" src="" alt="Preview">
            <div class="scanner-laser" id="scanner-laser"></div>
            <ion-icon name="scan-circle" class="scanner-icon" id="main-icon"></ion-icon>
        </div>
        
        <div id="ai-status">جاهز للمسح 🟢</div>

        <div style="margin-top: 30px;">
            <label for="ai-camera-input" class="magic-btn btn-ai-scan">
                <ion-icon name="aperture"></ion-icon>
                <span>تصوير الدواء للتحليل 📸</span>
            </label>
            <input type="file" id="ai-camera-input" accept="image/*" capture="environment" style="display: none;" onchange="startGeminiAI(event)">
        </div>
    </div>

    <div id="royal-alert-overlay" class="custom-alert-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999999;">
        <div class="custom-alert-box" style="background: linear-gradient(145deg, #111, #1a1a2e); border: 1px solid var(--blue); padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; animation: scaleUp 0.3s ease; box-shadow: 0 20px 50px rgba(0, 210, 255, 0.3);">
            <ion-icon name="medical" style="font-size: 50px; margin-bottom: 5px; color: var(--blue); filter: drop-shadow(0 0 10px var(--blue));"></ion-icon>
            
            <h3 id="res-name" style="margin: 0 0 15px 0; color: white; font-family: 'Cairo'; font-size: 22px;">اسم الدواء</h3>
            
            <div style="background: rgba(0,0,0,0.5); border-radius: 15px; padding: 15px; margin-bottom: 20px; max-height: 250px; overflow-y: auto; text-align: right; border: 1px dashed rgba(255,255,255,0.2);">
                <p style="margin: 0 0 10px 0; font-size: 13px; color: #ccc;"><strong style="color: var(--green);">✨ دواعي الاستعمال:</strong> <br><span id="res-uses" style="color: white; line-height: 1.5;">...</span></p>
                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;"></div>
                <p style="margin: 0 0 10px 0; font-size: 13px; color: #ccc;"><strong style="color: var(--blue);">💊 الجرعة المعتادة:</strong> <br><span id="res-dosage" style="color: white; line-height: 1.5;">...</span></p>
                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;"></div>
                <p style="margin: 0; font-size: 13px; color: #ccc;"><strong style="color: var(--red);">⚠️ تحذيرات هامة:</strong> <br><span id="res-warnings" style="color: white; line-height: 1.5;">...</span></p>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="hm-btn" onclick="closeAIModal()" style="width: 100%; margin: 0; background: var(--blue); color: black; font-weight: bold; font-family: 'Cairo'; padding: 12px; border-radius: 12px;">إغلاق</button>
            </div>
        </div>
    </div>

   <script>
        // 🔑 الصق مفتاح OpenRouter الخاص بك هنا (يبدأ بـ sk-or- )
        const OPENROUTER_API_KEY = "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"; 

        window.goToPage = function(pageUrl) {
            const progressBar = document.getElementById('top-progress-bar');
            if (progressBar) {
                progressBar.style.display = 'block';
                setTimeout(() => { progressBar.style.width = '70%'; }, 10);
                setTimeout(() => { progressBar.style.width = '100%'; window.location.href = pageUrl; }, 300);
            } else {
                window.location.href = pageUrl;
            }
        };

        // 🧠 محرك OpenRouter (تم تصحيح اسم الدالة ليتطابق مع الـ HTML)
      // 🧠 محرك OpenRouter (النسخة الرسمية المستقرة والمدرعة)
        async function startGeminiAI(event) {
            const file = event.target.files[0];
            if (!file) return;

            if(!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("ضع")) {
                document.getElementById('res-name').innerText = "تنبيه للمطور ⚠️";
                document.getElementById('res-uses').innerText = "نسيت وضع مفتاح OpenRouter في الكود.";
                document.getElementById('res-dosage').innerText = "--";
                document.getElementById('res-warnings').innerText = "اذهب إلى openrouter.ai واحضر المفتاح.";
                document.getElementById('royal-alert-overlay').style.display = 'flex';
                return;
            }

            const previewImg = document.getElementById('preview-img');
            const mainIcon = document.getElementById('main-icon');
            const laser = document.getElementById('scanner-laser');
            const statusTxt = document.getElementById('ai-status');

            const reader = new FileReader();
            reader.onload = async function(e) {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                mainIcon.style.display = 'none'; 
                laser.style.display = 'block'; 
                
                const base64Image = e.target.result.split(',')[1];
                const mimeType = file.type;

                statusTxt.innerText = "جاري الاتصال بالسيرفرات المستقرة... 🚀";
                statusTxt.style.color = "var(--orange)";

                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': 'https://healthmate.app', 
                            'X-Title': 'Healthmate' 
                        },
                        body: JSON.stringify({
                            // 🔥 استخدام النسخة الرسمية المستقرة لتجنب أخطاء 404 للأبد
                            model: "google/gemini-1.5-flash",
                            messages: [{
                                role: "user",
                                content: [
                                    { type: "text", text: "أنت صيدلي خبير. استخرج اسم الدواء ودواعي استعماله من هذه الصورة. أرجع الناتج بصيغة JSON فقط بهذا الشكل: {\"name\": \"اسم الدواء\", \"uses\": \"الاستعمال\", \"dosage\": \"الجرعة\", \"warnings\": \"التحذيرات\"}. إذا لم تكن صورة دواء، أرجع {\"name\": \"error\"} فقط. لا تكتب أي كلمة أخرى خارج الـ JSON أبداً." },
                                    { type: "image_url", image_url: { url: `data:${mimeType};base64,${base64Image}` } }
                                ]
                            }],
                            temperature: 0.1
                        })
                    });

                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error ? data.error.message : "خطأ في السيرفر");
                    }

                    laser.style.display = 'none';

                    let aiText = data.choices[0].message.content;
                    
                    aiText = aiText.substring(aiText.indexOf('{'), aiText.lastIndexOf('}') + 1);
                    const resultJson = JSON.parse(aiText);

                    if(resultJson.name === 'error') {
                        statusTxt.innerText = "هذه ليست علبة دواء واضحة! ❌";
                        statusTxt.style.color = "var(--red)";
                        return;
                    }

                    statusTxt.innerText = "تم التشخيص بنجاح! ✅";
                    statusTxt.style.color = "var(--green)";
                    
                    document.getElementById('res-name').innerText = resultJson.name || "دواء غير معروف";
                    document.getElementById('res-uses').innerText = resultJson.uses || "غير متوفر";
                    document.getElementById('res-dosage').innerText = resultJson.dosage || "غير متوفر";
                    document.getElementById('res-warnings').innerText = resultJson.warnings || "لا توجد تحذيرات";
                    
                    document.getElementById('royal-alert-overlay').style.display = 'flex';

                } catch (error) {
                    console.error("AI Error:", error);
                    laser.style.display = 'none';
                    statusTxt.innerText = "فشل الاتصال ⚠️ تأكد من الإنترنت أو وضوح الصورة.";
                    statusTxt.style.color = "var(--red)";
                    
                    document.getElementById('res-name').innerText = "خطأ تقني ⚠️";
                    document.getElementById('res-uses').innerText = "التفاصيل: " + error.message;
                    document.getElementById('res-dosage').innerText = "--";
                    document.getElementById('res-warnings').innerText = "حاول التقاط الصورة في إضاءة أفضل أو تحقق من اتصالك.";
                    document.getElementById('royal-alert-overlay').style.display = 'flex';
                }
            };
            reader.readAsDataURL(file);
        }

        function closeAIModal() {
            document.getElementById('royal-alert-overlay').style.display = 'none';
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('main-icon').style.display = 'block';
            document.getElementById('ai-status').innerText = "جاهز للمسح 🟢";
            document.getElementById('ai-status').style.color = "#00d2ff";
            document.getElementById('ai-camera-input').value = ''; 
        }
    </script>
</body>
</html>
