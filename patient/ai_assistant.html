<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المساعد الطبي الذكي VIP</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --blue: #00d2ff;
            --purple: #b794f4;
            --text-main: #ffffff;
            --text-sub: #888888;
            --green: #42e695;
            --gold: #f6e58d;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: var(--bg-color); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 👑 هيدر بسيط زجاجي */
        .ai-header {
            padding: calc(env(safe-area-inset-top, 20px) + 15px) 20px 15px;
            display: flex; align-items: center; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100;
        }
        .ai-header ion-icon { font-size: 28px; cursor: pointer; color: white; }
  /* الهيدر صار هو المرجع الأساسي */
.ai-header {
    position: relative; /* ضروري باش الأيقونة تتحرك بالنسبة للهيدر فقط */
    display: flex;
    align-items: center;
    justify-content: center; /* يخلي العنوان في الوسط تماماً */
    padding: calc(env(safe-area-inset-top, 20px) + 15px) 20px 15px;
    background: rgba(10, 10, 10, 0.9);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    z-index: 100;
}

/* الأيقونة ثابتة في اليمين دائماً */
.ai-header ion-icon {
    position: absolute; /* خرجناها من مسار العناصر العادي باش ما تدفعش النص */
    right: 20px; /* ثابتة في اليمين دائماً مهما كانت اللغة */
    font-size: 28px;
    cursor: pointer;
    color: white;
    z-index: 2;
}

/* العنوان في الوسط الحقيقي */
.ai-header h2 {
    margin: 0;
    font-size: 18px;
    color: var(--blue); /* */
    font-weight: 900;
    text-align: center;
    width: 100%; /* يضمن أنه يأخذ عرض الشاشة ليتوسط النص بداخلها */
}

        /* 🤖 قسم الرأس (الوجه التفاعلي الجديد) */
        .ai-avatar-section {
            padding: 25px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, rgba(183, 148, 244, 0.08) 0%, transparent 75%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* النواة الخارجية (الدائرة) */
        .ai-core {
            width: 90px; height: 90px; border-radius: 50%;
            background: rgba(10, 10, 10, 0.6);
            display: flex; justify-content: center; align-items: center;
            position: relative; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        /* الحلقات المحيطة (تظهر عند التفكير) */
        .ai-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px dashed rgba(255, 255, 255, 0.2);
            opacity: 0.5; transition: 0.5s;
        }

        /* 👨‍برمجة الوجه (العيون والفم) */
        .ai-face {
            width: 50px; height: 40px;
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            position: relative; z-index: 5;
        }

        .eyes-container {
            display: flex; gap: 15px; margin-top: 5px;
            transition: transform 0.4s ease; /* أنيميشن تحرك العيون للأسفل */
        }

        .eye {
            width: 12px; height: 12px; border-radius: 50%;
            background: #fff; position: relative;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transition: height 0.2s ease; /* لأنيميشن الغمز */
        }

        /* بؤبؤ العين (Pupil) */
        .eye::after {
            content: ''; position: absolute;
            width: 5px; height: 5px; border-radius: 50%;
            background: #000; top: 3.5px; left: 3.5px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mouth {
            width: 25px; height: 3px; border-radius: 10px;
            background: #fff; margin-bottom: 5px;
            transition: all 0.3s ease; /* أنيميشن التحدث */
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* =========================================
           ✨ برمجة حالات الأنيميشن الـ 4 
           ========================================= */

        /* 1. حالة الهدوء (Idle) - يتنفس وينظر حوله */
        .ai-core.idle { animation: breathe 4s ease-in-out infinite; }
        .ai-core.idle .eye::after { animation: lookAround 8s ease-in-out infinite; }

        /* 2. حالة الكتابة (Typing) - **يخفض عينيه لينظر للاسفل!** 🚨 */
        .ai-core.looking-down {
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.2);
        }
        .ai-core.looking-down .eyes-container {
            transform: translateY(6px) scaleX(1.05); /* العيون تنزل للاسفل وتقترب قليلاً */
        }
        .ai-core.looking-down .eye::after {
            transform: translate(0, 3px); /* البؤبؤ ينزل للاسفل */
        }
        .ai-core.looking-down .mouth {
            width: 18px; /* الفم يصغر قليلاً في وضع التركيز */
            transform: translateY(2px);
        }

        /* 3. حالة التفكير (Thinking) - دوائر تدور وألوان تتغير */
        .ai-core.thinking {
            box-shadow: 0 0 40px rgba(246, 229, 141, 0.6);
            transform: scale(1.05);
        }
        .ai-core.thinking .ai-ring {
            animation: spinRing 1s linear infinite;
            border: 2px dashed rgba(246, 229, 141, 0.8);
            opacity: 1;
        }
        .ai-core.thinking .eye { background: var(--gold); box-shadow: 0 0 15px rgba(246, 229, 141, 0.8); }
        .ai-core.thinking .eye::after { animation: thinkEyes 0.6s infinite alternate; }

        /* 4. حالة التحدث (Speaking) - الفم يتحرك والوجه يتوهج أخضر */
        .ai-core.speaking {
            box-shadow: 0 0 50px rgba(66, 230, 149, 0.5);
            animation: breathe 1s ease-in-out infinite;
        }
        .ai-core.speaking .mouth {
            animation: mouthSpeak 0.3s infinite alternate;
            background: var(--green); box-shadow: 0 0 12px var(--green);
        }
        .ai-core.speaking .eye { background: var(--green); }

        /* 🎬 تعريف حركات الأنيميشن (Keyframes) */
        @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); } 50% { transform: scale(1.03); box-shadow: 0 0 45px rgba(183, 148, 244, 0.5); } }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        /* أنيميشن حركة العيون العشوائية */
        @keyframes lookAround { 0%, 100%, 80% { transform: translate(0, 0); } 10%, 15% { transform: translate(2px, -1px); } 30%, 35% { transform: translate(-2px, 1px); } 50%, 55% { transform: translate(0, 2px); /* ينظر للاسفل */ } 60% { height: 1px; /* يغمز */ } 62% { height: 12px; } }
        @keyframes thinkEyes { from { transform: scale(0.8) translate(0,0); } to { transform: scale(1.1) translate(0, -1px); } }
        /* أنيميشن حركة الفم عند الحديث */
        @keyframes mouthSpeak { 0% { height: 3px; width: 25px; border-radius: 10px; } 50% { height: 10px; width: 20px; border-radius: 5px; } 100% { height: 2px; width: 28px; border-radius: 10px; } }

        .ai-status-text { margin-top: 15px; font-size: 13px; color: var(--blue); font-weight: bold; }

        /* 💬 منطقة الدردشة */
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .chat-area::-webkit-scrollbar { display: none; }

        .msg-bubble { max-width: 80%; padding: 15px; border-radius: 20px; font-size: 14px; line-height: 1.6; animation: slideIn 0.3s ease; position: relative; }
        .ai-msg { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-start; border-top-right-radius: 5px; color: #ddd; }
        .user-msg { background: var(--blue); color: #000; font-weight: bold; align-self: flex-end; border-top-left-radius: 5px; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2); }
        .time { font-size: 9px; position: absolute; bottom: -15px; color: #555; }
        .ai-msg .time { right: 5px; } .user-msg .time { left: 5px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ⌨️ منطقة الإدخال */
        .input-area {
            padding: 15px 20px calc(env(safe-area-inset-bottom, 20px) + 15px);
            background: rgba(10, 10, 10, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; gap: 10px; align-items: center; z-index: 10;
        }

        .input-box {
            flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 15px 20px; color: white; font-family: 'Cairo';
            font-size: 14px; outline: none; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--blue); background: rgba(0, 210, 255, 0.05); }

        .send-btn {
            background: var(--blue); border: none; width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; color: #000;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }
        .send-btn ion-icon { font-size: 24px; transform: rotate(180deg); /* تدوير للغة العربية */ }
         /* زر الإرفاق الجديد */
        .attach-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            color: var(--blue);
            font-size: 24px;
            transition: 0.3s;
        }
        .attach-btn:active { transform: scale(0.9); background: var(--blue); color: #000; }

        /* تنسيق الصور داخل الدردشة */
        .chat-image {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="ai-header">
        <ion-icon name="arrow-forward-outline" onclick="history.back()"></ion-icon>
        <h2 >MATE AI Health</h2>
    </div>

    <div class="ai-avatar-section">
        <div class="ai-core idle" id="ai-core">
            <div class="ai-ring"></div>
            
            <div class="ai-face">
                <div class="eyes-container">
                    <div class="eye"></div> <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>

        </div>
        <div class="ai-status-text" id="ai-status" data-i18n="ai_status_idle">جاهز لمساعدتك... 📡</div>
    </div>

    <div class="chat-area" id="chat-box">
        <div class="msg-bubble ai-msg">
            <span data-i18n="ai_greeting">أهلاً بك يا بطل! أنا مساعدك الصحي الذكي. صف لي أعراضك الطبية، وسأقوم بتحليلها فوراً. أنا مبرمج للحديث عن الصحة فقط. 🤖🩺</span>
        </div>
    </div>

<div class="input-area">
    <button class="attach-btn" onclick="notifyImageUnderDev()">
        <ion-icon name="add-outline"></ion-icon>
    </button>
    <input type="file" id="image-input" accept="image/*" style="display: none;">
    <input type="text" id="user-input" class="input-box" placeholder="صف لي أعراضك الطبية هنا..." data-i18n-placeholder="ai_input_placeholder" onkeypress="handleEnter(event)" onfocus="setAiLookingDown(true)" onblur="setAiLookingDown(false)">
    
    <button class="send-btn" onclick="sendMessage()">
        <ion-icon name="send"></ion-icon>
    </button>
</div>

<div id="image-preview-container" style="display: none; position: absolute; bottom: 90px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; border: 1px solid var(--blue); backdrop-filter: blur(10px); z-index: 1000;">
    <img id="image-preview" src="" style="max-width: 100px; max-height: 100px; border-radius: 10px; display: block;">
    <ion-icon name="close-circle" style="position: absolute; top: -10px; right: -10px; font-size: 25px; color: var(--purple); cursor: pointer;" onclick="clearImage()"></ion-icon>
</div>
<script src="../js/languages.js"></script>
   <script>
    const core = document.getElementById('ai-core');
    const status = document.getElementById('ai-status');
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    
    // 🌍 إعدادات اللغة (جلب القاموس بناءً على خيار المستخدم)
    const appLang = localStorage.getItem('app_lang') || 'ar';
    const dict = (window.translations && window.translations[appLang]) || {};

    // 🧠 إدارة الذاكرة الدائمة (LocalStorage)
    let chatHistory = [];
    let selectedImageBase64 = null;

    // 1. تحميل المحادثة عند فتح الصفحة وتفقد الصلاحية (يومين)
    window.onload = () => {
        applyTranslations(); // 🚨 ترجمة الواجهة فور فتح الصفحة
        
        const savedData = localStorage.getItem('mate_ai_chat');
        if (savedData) {
            const parsed = JSON.parse(savedData);
            const now = new Date().getTime();
            const twoDays = 2 * 24 * 60 * 60 * 1000; // 48 ساعة بالملي ثانية

            if (now - parsed.timestamp < twoDays) {
                chatHistory = parsed.history;
                // إعادة عرض الرسائل القديمة في الواجهة
                chatHistory.forEach(msg => {
                    addMessage(msg.content, msg.role === 'user' ? 'user-msg' : 'ai-msg', null, true);
                });
            } else {
                localStorage.removeItem('mate_ai_chat'); // مسحها لأنها منتهية الصلاحية
            }
        }
    };

    // 🌍 دالة ترجمة واجهة المستخدم (تحديث العناصر التي تحمل data-i18n)
    function applyTranslations() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (dict[key]) el.innerText = dict[key];
        });

        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (dict[key]) el.placeholder = dict[key];
        });
    }

    // 2. حفظ المحادثة في الذاكرة الدائمة
    function saveChatToLocal() {
        const dataToSave = {
            timestamp: new Date().getTime(),
            history: chatHistory
        };
        localStorage.setItem('mate_ai_chat', JSON.stringify(dataToSave));
    }

    function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

    // 📸 معالجة الصور
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                document.getElementById('image-preview').src = selectedImageBase64;
                document.getElementById('image-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    function clearImage() {
        selectedImageBase64 = null;
        document.getElementById('image-input').value = "";
        document.getElementById('image-preview-container').style.display = 'none';
    }

    function setAiLookingDown(isFocus) {
        if (!core.classList.contains('thinking') && !core.classList.contains('speaking')) {
            if (isFocus) { core.classList.remove('idle'); core.classList.add('looking-down'); }
            else { core.classList.remove('looking-down'); core.classList.add('idle'); }
        }
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        // إضافة الرسالة للواجهة والذاكرة
        addMessage(text, 'user-msg');
        chatHistory.push({"role": "user", "content": text});
        
        input.value = '';
        input.blur();

        // 🚨 استخدام مفتاح الترجمة لحالة التفكير
        setAiState('thinking', dict.ai_status_thinking || 'جاري تحليل البيانات... 🧠');

        try {
            const response = await fetch('http://127.0.0.1:5000/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    history: chatHistory 
                })
            });

            if (!response.ok) throw new Error("السيرفر لا يستجيب");
            const data = await response.json();
            
            // 🚨 استخدام مفتاح الترجمة لحالة التحدث
            setAiState('speaking', dict.ai_status_speaking || 'جاري صياغة الرد... 🗣️');
            
            setTimeout(() => {
                if (data.error) {
                    addMessage("حدث خطأ: " + data.error, 'ai-msg');
                } else {
                    const cleanReply = data.reply.replace(/\*\*/g, '').replace(/\*/g, '');
                    addMessage(cleanReply, 'ai-msg');
                    chatHistory.push({"role": "assistant", "content": cleanReply});

                    // حماية الذاكرة (آخر 14 رسالة)
                    if (chatHistory.length > 14) chatHistory = chatHistory.slice(chatHistory.length - 14);
                    
                    saveChatToLocal(); // حفظ التحديث في الذاكرة الدائمة
                }
                // 🚨 العودة لحالة الانتظار المترجمة
                setAiState('idle', dict.ai_status_idle || 'جاهز لمساعدتك... 📡');
            }, 1000);

        } catch (error) {
            // 🚨 رسالة الخطأ المترجمة
            const errorMsg = dict.ai_error_conn || "لم أتمكن من الاتصال بمحرك البايثون. تأكد من تشغيل السيرفر. ❌";
            addMessage(errorMsg, 'ai-msg');
            setAiState('idle', dict.ai_status_idle || 'جاهز لمساعدتك... 📡');
        }
    }

    function addMessage(text, className, imageSrc = null, isHistory = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-bubble ' + className;
        
        if (imageSrc) {
            const img = document.createElement('img');
            img.src = imageSrc;
            img.style.maxWidth = "100%";
            img.style.borderRadius = "10px";
            img.style.marginBottom = "5px";
            msgDiv.appendChild(img);
        }

        if (text) {
            const textSpan = document.createElement('span');
            textSpan.innerText = text;
            msgDiv.appendChild(textSpan);
        }

        const timeSpan = document.createElement('span');
        timeSpan.className = 'time';
        const now = new Date();
        timeSpan.innerText = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();
        msgDiv.appendChild(timeSpan);

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setAiState(state, text) {
        core.classList.remove('idle', 'thinking', 'speaking', 'looking-down');
        core.classList.add(state);
        status.innerText = text;
        if(state === 'thinking') status.style.color = 'var(--gold)';
        else if(state === 'speaking') status.style.color = 'var(--green)';
        else status.style.color = 'var(--blue)';
    }

    // دالة إخبار المستخدم أن الميزة قيد التطوير (مترجمة)
    function notifyImageUnderDev() {
        const msg = dict.ai_image_dev_msg || "هذه الميزة قيد التطوير حالياً. يرجى كتابة الأعراض التي تريد استشارتي فيها وسأقوم بمساعدتك فوراً! 🩺🤖";
        addMessage(msg, 'ai-msg');
    }
</script>
</script>
</body>
</html>
