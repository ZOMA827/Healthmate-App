<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healthmate | Patient Community</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="css/community_style.css">
    <link rel="stylesheet" href="css/profile_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
<style>
    /* 🛡️ حماية الشريط العلوي وضبط التموضع */
    .main-nav {
        padding-top: env(safe-area-inset-top, 35px) !important;
        height: auto !important;
        display: flex;
        align-items: center;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-app);
        position: sticky; /* يبقى في الأعلى */
        top: 0;
        z-index: 1000;
        margin-bottom: 0 !important; /* إلغاء أي فراغ سفلي */
    }

    /* 🚀 الحل القاتل للفراغ (الرااغ) 🚀 */
    .main-wrapper {
        margin-top: 0 !important; /* إلغاء الـ 85px اللي راهي دايرة الفراغ */
        padding-top: 0 !important;
    }

    /* 🔍 تصغير حجم إطار البحث ليكون أكثر أناقة */
    .search-box-patient {
        flex: 1;
        max-width: 160px; 
        height: 32px;
        background: var(--input-bg);
        border-radius: 18px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        border: 1px solid var(--border-app);
    }
    
    .search-box-patient input {
        font-size: 12px !important;
    }

    .search-box-patient ion-icon {
        font-size: 16px !important;
    }

    /* زر الرجوع العلوي */
    .nav-back-btn {
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 24px;
        display: flex;
        align-items: center;
        margin-left: 10px;
        cursor: pointer;
    }

    .feed-section {
        padding-top: 0 !important;
    }

    /* تحسين شكل عنوان المجتمع الطبي */
    .community-title-box {
        text-align: center;
        padding: 15px 0;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-app);
        margin-bottom: 10px;
    }
</style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-content" style="display: flex; align-items: center; width: 100%; padding: 5px 10px;">
        
        <button class="nav-back-btn" onclick="window.location.href='patient/patient_dash.html'">
            <ion-icon name="arrow-forward-outline"></ion-icon>
        </button>

        <div class="nav-icons" style="flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px;">
            <div class="search-box-patient">
                <input type="text" id="searchInput" data-i18n="search_placeholder" placeholder="بحث..." 
                       onkeyup="if(typeof performAdvancedSearch === 'function') performAdvancedSearch()" 
                       style="border: none; background: transparent; outline: none; width: 100%; color: var(--text-main); font-family: 'Cairo';">
                <ion-icon name="search" style="color: var(--primary);"></ion-icon>
            </div>
        </div>
        
        <div class="user-menu-wrapper" style="position: relative;">
            <div class="user-pill" onclick="toggleDropdown()" style="width: 32px; height: 32px; cursor: pointer;">
                <img id="nav-user-img" src="assets/img/profile.png" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
            </div>
            
        <div class="dropdown-menu" id="profileDropdown" style="position: absolute; top: 40px; inset-inline-end: 0; text-align: start;">
                <div class="dropdown-item" onclick="openProfileSlide(); toggleDropdown();">
                    <ion-icon name="person-circle-outline"></ion-icon> 
                    <span data-i18n="nav_profile">عرض ملفي الشخصي</span>
                </div>
                
                <div class="dropdown-item" onclick="toggleDarkMode(); toggleDropdown();">
                    <ion-icon name="moon-outline"></ion-icon> 
                    <span data-i18n="nav_dark_mode">الوضع المظلم</span>
                </div>
                
                <div class="dropdown-item" style="color: var(--danger);" onclick="window.logoutUser()">
                    <ion-icon name="log-out-outline" style="color: var(--danger);"></ion-icon> 
                    <span data-i18n="nav_logout">تسجيل الخروج</span>
                </div>
            </div>
        </div>

    </div>
</nav>

    <div class="main-wrapper">
        <aside class="right-aside">
           <div class="profile-card" onclick="openProfileSlide()">
                <div class="cover"></div>
                <img id="side-user-img" src="assets/img/profile.png">
                <h3 id="user-name">جاري التحميل...</h3>
                <p id="user-role" data-i18n="role_patient">مريض</p>
                <hr style="border: 0; border-top: 1px solid var(--border-app); margin: 15px 0;">
                <div style="color: var(--primary); font-weight: bold; font-size: 14px;" data-i18n="nav_profile">الذهاب لملفي</div>
            </div>
        </aside>

       <main class="feed-section" id="main-feed-area">
          <div style="text-align: center; padding: 20px 0; background: var(--card-bg); border-bottom: 1px solid var(--border-app); margin-bottom: 15px;">
    <h2 data-i18n="nav_community" style="margin: 0; font-family: 'Cairo'; font-weight: 900; font-size: 24px; color: var(--primary); letter-spacing: -0.5px;">المجتمع الطبي</h2>
    <p style="margin: 5px 0 0 0; font-size: 13px; color: var(--text-sub);" data-i18n="community_subtext">تابع آخر نصائح الأطباء ومنشورات الصيادلة</p>
</div>

            <div id="posts-container" style="margin-top: 15px;">
                <div style="text-align: center; padding: 50px; color: var(--text-sub);">
                    <ion-icon name="sync-outline" style="font-size: 40px; animation: spin 1s linear infinite;"></ion-icon>
                    <p data-i18n="loading_community">جاري تحميل المجتمع...</p>
                </div>
            </div>
        </main>
    </div>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-header">
            <ion-icon name="arrow-forward-outline" style="font-size: 28px; cursor: pointer; color: var(--text-main);" onclick="closeSearchOverlay()" data-i18n="btn_back_title"></ion-icon>
            <div class="search-input-box">
                <input type="text" id="overlaySearchInput" data-i18n="search_placeholder" placeholder="ابحث..." onkeyup="if(typeof performAdvancedSearch === 'function') performAdvancedSearch()">
                <ion-icon name="search" style="color: var(--primary);"></ion-icon>
            </div>
        </div>
        <div class="search-results" id="searchResultsArea">
            <div style="text-align:center; padding: 40px; color: var(--text-sub);" data-i18n="search_placeholder">اكتب للبحث...</div>
        </div>
    </div>

    <div id="postDetailsSlidePage" class="slide-page" style="z-index: 10001; background: var(--bg-app);">
        <div class="slide-header">
            <button class="back-btn-circle" onclick="window.closeSPA('postDetailsSlidePage')">
                <ion-icon name="arrow-forward-outline"></ion-icon>
            </button>
            <div style="font-weight: 800; font-size: 18px;" data-i18n="post_details_title">المنشور</div>
            <div style="width: 40px;"></div>
        </div>
        <div id="pd-scroll-area" style="overflow-y: auto; height: calc(100vh - 135px); padding-bottom: 20px;">
            <div id="pd-post-container" style="background: var(--card-bg); margin-bottom: 10px; border-bottom: 1px solid var(--border-app); box-shadow: var(--shadow);"></div>
            <div style="padding: 10px 15px; font-weight: bold; color: var(--text-main);" data-i18n="action_comment">التعليقات</div>
            <div id="pd-comments-list" style="padding: 0 15px;">
                <div style="text-align: center; padding: 30px; color: var(--text-sub);"><ion-icon name="sync" style="animation: spin 1s infinite; font-size: 30px;"></ion-icon></div>
            </div>
        </div>
        <div class="comment-input-bar" style="position: absolute; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-top: 1px solid var(--border-app); padding: 10px 15px; display: flex; gap: 10px; align-items: center; z-index: 10; height: 70px;">
            <div id="pd-reply-badge" style="display: none; position: absolute; top: -30px; right: 15px; background: var(--primary); color: white; padding: 3px 15px; border-radius: 15px 15px 0 0; font-size: 12px; box-shadow: 0 -2px 5px rgba(0,0,0,0.1);">
                <span data-i18n="reply_to_text">رد على:</span> <span id="pd-reply-name" style="font-weight: bold;"></span>
                <ion-icon name="close-circle" onclick="window.cancelReply()" style="cursor: pointer; margin-right: 5px; vertical-align: middle; font-size: 16px;"></ion-icon>
            </div>
            <img id="pd-my-avatar" src="assets/img/profile.png" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-app);">
            <input type="text" id="pd-comment-input" data-i18n="write_comment" placeholder="اكتب تعليقاً..." style="flex: 1; border-radius: 20px; border: 1px solid var(--border-app); padding: 10px 15px; background: var(--input-bg); outline: none; color: var(--text-main); font-family: 'Cairo';">
            <button id="pd-send-btn" onclick="window.submitComment()" style="background: var(--input-bg); border: none; color: var(--primary); font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <ion-icon name="send"></ion-icon>
            </button>
        </div>
    </div>

    <div id="storyViewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; flex-direction:column;">
        <div id="storyProgressBars" style="display:flex; gap:4px; padding:15px 10px 5px; position:absolute; top:0; left:0; width:100%; z-index:20;"></div>
        <div style="position:absolute; top:25px; left:0; width:100%; padding:10px 15px; display:flex; justify-content:space-between; align-items:center; z-index:20; background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="window.closeStoryViewer(); window.openProfileSlide(window.allGroupedStories[window.currentStoryUserIdx].authorId)">
                <img id="storyViewerPic" src="" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--primary); object-fit:cover;">
                <div>
                    <strong style="color:white; font-size:15px; display:flex; align-items:center; gap:5px;">
                        <span id="storyViewerName" data-i18n="default_user_name">مستخدم</span>
                        <span id="storyVerifiedBadge" style="display:none; color:#1da1f2; font-size:14px;"><ion-icon name="checkmark-circle"></ion-icon></span>
                    </strong>
                    <small id="storyViewerTime" data-i18n="time_now" style="color:#ddd; font-size:11px; display:block;">الآن</small>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:15px;">
                <ion-icon name="close" style="color:white; font-size:32px; cursor:pointer; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));" onclick="window.closeStoryViewer()"></ion-icon>
            </div>
        </div>
        <div style="flex:1; position:relative; display:flex; justify-content:center; align-items:center; overflow:hidden;">
            <div onclick="window.prevStory()" style="position:absolute; top:15%; left:0; width:30%; height:70%; z-index:15;"></div>
            <div id="storyContentMedia" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
            <div onclick="window.nextStory()" style="position:absolute; top:15%; right:0; width:70%; height:70%; z-index:15;"></div>
        </div>
        <div id="storyReplyBar" style="position:absolute; bottom:0; left:0; width:100%; padding:15px; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index:20; display:none; gap:10px; align-items:center;">
            <input type="text" id="storyReplyInput" data-i18n="story_reply_placeholder" placeholder="إرسال رسالة..." style="flex:1; border-radius:30px; padding:12px 20px; background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); color:white; outline:none; font-family:'Cairo'; backdrop-filter:blur(5px);" onfocus="clearTimeout(window.storyTimer)" onblur="window.resumeStoryTimer()">
            <div style="display:flex; gap:10px; font-size:26px;">
                <span onclick="window.sendQuickStoryReaction('❤️')" style="cursor:pointer;">❤️</span>
                <span onclick="window.sendQuickStoryReaction('😂')" style="cursor:pointer;">😂</span>
            </div>
            <button onclick="window.replyToStory()" style="background:var(--primary); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px;">
                <ion-icon name="send" style="transform:rotate(180deg); margin-left:-3px;"></ion-icon>
            </button>
            <button onclick="window.likeCurrentStory(this)" id="storyLikeBtn" style="background:none; border:none; color:white; font-size:32px; cursor:pointer; display:flex; align-items:center;">
                <ion-icon name="heart-outline"></ion-icon>
            </button>
        </div>
    </div>

    <div id="mediaViewer" class="media-viewer-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99999; flex-direction:column; touch-action:none; overscroll-behavior:none;">
        <div id="viewerHeader" class="viewer-ui viewer-header" style="position:absolute; top:0; left:0; width:100%; height:100px; display:flex; justify-content:space-between; align-items:flex-start; padding: 45px 20px 0 20px; z-index:10; background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition:0.3s ease;">
            <button id="closeViewerBtn" class="viewer-btn-circle" onclick="window.closeMediaViewer()"><ion-icon name="close-outline"></ion-icon></button>
        </div>
        <div id="viewerMainArea" class="viewer-img-container" style="flex:1; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;">
            <img id="viewerImage" src="" style="max-width:100%; max-height:100%; object-fit:contain; pointer-events:none; transition:transform 0s ease;">
            <div id="viewerGestureDetector" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:5; background:transparent;"></div>
        </div>
        <div id="viewerFooter" class="viewer-ui viewer-footer" style="position:absolute; bottom:0; left:0; width:100%; background:linear-gradient(to top, rgba(0,0,0,0.8) 50%, transparent); color:white; padding:20px; transition:0.3s ease; z-index:10; display:flex; flex-direction:column; gap:15px; ">
            <div style="font-size:14px; font-weight:900;" onclick="window.closeMediaViewer(); window.showLikes(window.viewerCurrentPostId);">
                <span style="font-size:16px;">👍</span> <span id="viewerLikesCount">---</span>
            </div>
            <div style="display:flex; justify-content:space-around; align-items:center; padding:10px 0; border-top: 1px solid rgba(255,255,255,0.1); margin-top:5px;">
                <button class="action-btn" id="viewerLikeBtn" style="background:none; border:none; color:white; font-size:16px; display:flex; align-items:center; gap:8px;">
                    <ion-icon name="heart-outline"></ion-icon> أعجبني
                </button>
                <button class="action-btn" onclick="window.closeMediaViewer(); window.openPostDetailsSlide(window.viewerCurrentPostId);" style="background:none; border:none; color:white; font-size:16px; display:flex; align-items:center; gap:8px;">
                    <ion-icon name="chatbubble-outline"></ion-icon> تعليق
                </button>
            </div>
        </div>
    </div>

    <div id="profileSlidePage" class="slide-page">
        <div class="slide-header">
            <button class="back-btn-circle" onclick="closeSPA('profileSlidePage')"><ion-icon name="arrow-forward-outline"></ion-icon></button>
            <div style="font-weight: 800; font-size: 18px;" data-i18n="nav_profile">الملف الشخصي</div>
            <div style="width: 40px;"></div>
        </div>
        <div class="pro-container" id="profile-container-body">
            </div>
    </div>

    <div id="toast-msg"></div>
    <div id="patientEditProfileModal" class="modal">
        <div class="modal-content" style="max-width: 350px;">
            <div class="modal-header">
                <h2 data-i18n="edit_my_data_title">تعديل بياناتي</h2>
                <ion-icon name="close" style="cursor:pointer; font-size: 28px;" onclick="document.getElementById('patientEditProfileModal').style.display='none'"></ion-icon>
            </div>
            
            <label style="color: var(--text-sub); font-size: 13px;" data-i18n="lbl_full_name">الاسم الكامل:</label>
            <input type="text" id="edit-patient-name" class="modal-input" data-i18n="ph_write_name" placeholder="اكتب اسمك">
            
            <label style="color: var(--text-sub); font-size: 13px; margin-top: 10px;" data-i18n="lbl_phone_number">رقم الهاتف:</label>
            <input type="tel" id="edit-patient-phone" class="modal-input" data-i18n="ph_phone_example" placeholder="مثال: 0555555555" dir="ltr">
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="modal-btn" onclick="window.savePatientProfile()" style="flex: 2; background: var(--primary); color: white; border:none; font-weight:bold;" data-i18n="btn_save_changes">حفظ التغييرات</button>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <script src="js/languages.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/media-viewer.js"></script>
    <script src="js/app.js"></script>  <script src="js/post-details.js"></script>
    <script src="js/profile.js"></script> <script src="js/feed-algorithm.js"></script>
    <script src="js/story-studio.js"></script> 
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

    <script>
        document.addEventListener('deviceready', () => {
            const App = window.Capacitor.Plugins.App;
            App.addListener('backButton', () => {
                const mediaViewer = document.getElementById('mediaViewer');
                if (mediaViewer && mediaViewer.style.display !== 'none') { window.closeMediaViewer(); return; }
                const storyViewer = document.getElementById('storyViewer'); 
                if (storyViewer && storyViewer.style.display !== 'none') { window.closeStoryViewer(); return; }
                const activeSlides = Array.from(document.querySelectorAll('.slide-page.active'));
                if (activeSlides.length > 0) {
                    activeSlides.sort((a, b) => { return (parseInt(window.getComputedStyle(a).zIndex) || 0) - (parseInt(window.getComputedStyle(b).zIndex) || 0); });
                    const topSlide = activeSlides[activeSlides.length - 1]; 
                    if(typeof window.closeSPA === 'function') window.closeSPA(topSlide.id); else topSlide.classList.remove('active');
                    return; 
                }
                const activeModal = document.querySelector('.modal.active') || document.querySelector('.modal[style*="display: flex"]');
                if (activeModal) { activeModal.style.display = 'none'; activeModal.classList.remove('active'); return; }
                
                // الخروج يعيده للوحة المريض
                window.location.href = "patient/patient_dash.html"; 
            });
        });
    </script>
</body>
</html>
